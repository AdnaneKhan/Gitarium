# VENDORED FORK of jaq-std 3.0.1 (crates.io). See VENDOR.md for why.
#
# Sole deviation from upstream: the `jiff` dependency below sets
# `default-features = false, features = ["std", "tz-system"]` to drop the
# bundled IANA timezone database (~260 KB in the wasm). jaq's jq time
# builtins are UTC/system-based and never resolve named zones, and on wasm
# `TimeZone::system()` is UTC regardless of the bundle — so this is
# size-only, no behavior change on our target. Pulled in via the workspace
# root's `[patch.crates-io]`.
#
# The [[test]] / [dev-dependencies] entries from the published manifest are
# dropped: we consume only the library through the patch.

[package]
edition = "2021"
rust-version = "1.70"
name = "jaq-std"
version = "3.0.1"
authors = ["Michael Färber <michael.faerber@gedenkt.at>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Standard library for jaq"
readme = "README.md"
keywords = [
    "json",
    "query",
    "jq",
]
license = "MIT"
repository = "https://github.com/01mf02/jaq"

[features]
default = [
    "std",
    "format",
    "log",
    "math",
    "regex",
    "time",
]
format = [
    "aho-corasick",
    "base64",
    "urlencoding",
]
math = ["libm"]
regex = ["regex-bites"]
std = []
time = ["jiff"]

[lib]
name = "jaq_std"
path = "src/lib.rs"

[dependencies.aho-corasick]
version = "1.0"
optional = true

[dependencies.base64]
version = "0.22"
optional = true

[dependencies.bstr]
version = "1"

[dependencies.jaq-core]
version = "3.1.0"

# Slimmed: no bundled tzdb (default features pull tz-fat + tzdb-concatenated
# + tzdb-bundle-platform + tzdb-zoneinfo). `tz-system` keeps TimeZone::system()
# available (jaq-std calls it); on wasm it resolves to UTC with no bundle.
[dependencies.jiff]
version = "0.2.15"
optional = true
default-features = false
features = ["std", "tz-system"]

[dependencies.libm]
version = "0.2.7"
optional = true

[dependencies.log]
version = "0.4.17"
optional = true

[dependencies.regex-bites]
version = "0.1"
optional = true

[dependencies.urlencoding]
version = "2.1.3"
optional = true
