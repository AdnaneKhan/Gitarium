name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (with wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Caches the cargo registry, git deps, and target/ keyed on Cargo.lock,
      # so unchanged dependencies aren't recompiled on every run.
      - name: Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Test (native)
        run: cargo test --workspace

      # Web target: emits pkg/ (gitarium.js + gitarium_bg.wasm) for the browser app.
      - name: Build web wasm (release)
        run: wasm-pack build --target web

      # Headless-agent target: a separate, smaller cdylib (agent + foundation,
      # no renderer) → crates/headless/pkg.
      - name: Build headless wasm (release)
        run: wasm-pack build crates/headless --target web

      # Inlines glue + base64 wasm into a single self-contained dist/gitarium.html.
      - name: Build single-file dist.html
        run: bun scripts/build-html.ts

      # compression-level 0 = stored, uncompressed ("zip-less") entries: the
      # base64 HTML and the wasm barely shrink, so skipping deflate is faster.
      - name: Upload dist.html artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/gitarium.html
          if-no-files-found: error
          archive: false

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitarium-wasm
          path: pkg/gitarium_bg.wasm
          compression-level: 0
          if-no-files-found: error

      - name: Upload headless wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitarium-headless-wasm
          path: crates/headless/pkg/gitarium_headless_bg.wasm
          compression-level: 0
          if-no-files-found: error

  # Optional headless-Chrome run of the WebGL/Canvas2D harness. Non-blocking
  # (continue-on-error) because the live-API suite hits api.github.com and can
  # flake or rate-limit. The API-free boot smokes always run; the full suite
  # runs only when the live-API token is configured.
  #
  # To enable the full suite, add a repository secret named GITARIUM_TEST_TOKEN
  # (a GitHub PAT). The name can't be GITHUB_TOKEN — the GITHUB_ prefix is
  # reserved for secrets — so it's mapped onto $GITHUB_TOKEN below, which is
  # the only token source the harness reads in CI (never the .env.test file).
  browser-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (with wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      # The harness imports ./pkg/gitarium.js, so the wasm build must run first.
      - name: Build wasm (release)
        run: wasm-pack build --target web

      # Chrome is preinstalled on ubuntu-latest; the harness reads $CHROME.
      # Boot smokes are API-free, so they run on every push/PR (incl. forks,
      # where no secret is available). The full live-API suite runs only when
      # the test token is configured.
      - name: Boot smokes (no API)
        env:
          CHROME: google-chrome
        run: bun tests/test-browser.ts --smoke

      - name: Browser suite (live API)
        if: env.GITHUB_TOKEN != ''
        env:
          CHROME: google-chrome
        run: bun tests/test-browser.ts
