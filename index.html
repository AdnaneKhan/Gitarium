<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RustVM — GitHub</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #04070d;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="screen"></canvas>
    <script type="module">
      import init, {
        web_start,
        web_frame,
        web_resize,
        web_key,
        web_mouse_down,
        web_mouse_up,
        web_mouse_move,
        web_wheel,
        web_paste,
        web_cursor_style,
        web_set_font_px,
      } from "./pkg/rustvm.js";

      // Async results are queued wasm-side and drained by web_frame; rAF is
      // paused in hidden tabs, so schedule an explicit frame on wake.
      globalThis.host_wake = () =>
        setTimeout(() => web_frame(performance.now()), 0);

      await init();

      const canvas = document.getElementById("screen");
      // Read fresh on every use — zoom/monitor changes alter it at runtime.
      const dpr = () => window.devicePixelRatio || 1;
      const sizeCanvas = () => {
        canvas.width = Math.floor(canvas.clientWidth * dpr());
        canvas.height = Math.floor(canvas.clientHeight * dpr());
      };
      sizeCanvas();

      // Optional convenience: localStorage.setItem("rustvm_token", "<PAT>")
      const token = localStorage.getItem("rustvm_token") || undefined;
      web_start("screen", 15 * dpr(), token);

      const resized = () => {
        sizeCanvas();
        web_resize(canvas.width, canvas.height);
      };
      window.addEventListener("resize", resized);
      // dpr can change without a resize (browser zoom, moving the window to
      // another monitor); a one-shot media query on the current ratio fires
      // on any change, re-deriving canvas size and glyph scale.
      const watchDpr = () => {
        matchMedia("(resolution: " + dpr() + "dppx)").addEventListener(
          "change",
          () => {
            web_set_font_px(15 * dpr());
            resized();
            watchDpr();
          },
          { once: true },
        );
      };
      watchDpr();

      // Hidden input that holds focus so IME composition works (the xterm.js
      // pattern). Normal keys still flow through the keydown handler below;
      // composed text arrives via compositionend and is routed like a paste.
      const ime = document.createElement("input");
      ime.setAttribute("autocomplete", "off");
      ime.setAttribute("autocapitalize", "off");
      ime.setAttribute("spellcheck", "false");
      ime.style.cssText =
        "position:fixed;top:0;left:-9999px;width:1px;height:1px;opacity:0";
      document.body.appendChild(ime);
      let composing = false;
      ime.addEventListener("compositionstart", () => (composing = true));
      ime.addEventListener("compositionend", (e) => {
        composing = false;
        if (e.data) web_paste(e.data);
        ime.value = "";
      });
      // Consumed keydowns are preventDefaulted and never land here; clear
      // anything else so plain typing can't accumulate or double-insert.
      ime.addEventListener("input", () => {
        if (!composing) ime.value = "";
      });
      ime.focus({ preventScroll: true });

      window.addEventListener("keydown", (e) => {
        if (e.isComposing || e.keyCode === 229) return; // IME owns these
        // AltGr reports ctrl+alt (or the AltGraph modifier); strip both so
        // chars like @ { € type on intl layouts. Cmd acts as Ctrl on macOS.
        const altgr =
          e.key.length === 1 &&
          (e.getModifierState?.("AltGraph") || (e.ctrlKey && e.altKey));
        const ctrl = !altgr && (e.ctrlKey || e.metaKey);
        const alt = !altgr && e.altKey;
        if (ctrl && e.key.toLowerCase() === "v") return; // native paste
        if (web_key(e.key, ctrl, alt, e.shiftKey)) e.preventDefault();
      });
      window.addEventListener("paste", (e) => {
        const t = e.clipboardData?.getData("text");
        if (t) web_paste(t);
        e.preventDefault();
      });

      // Last canvas-relative position, for releases outside the canvas where
      // offsetX/Y would be relative to whatever element is under the cursor.
      let lastX = 0;
      let lastY = 0;
      canvas.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return; // primary button only
        e.preventDefault(); // keep focus on the IME input
        ime.focus({ preventScroll: true });
        lastX = e.offsetX;
        lastY = e.offsetY;
        web_mouse_down(e.offsetX * dpr(), e.offsetY * dpr());
      });
      canvas.addEventListener("mousemove", (e) => {
        lastX = e.offsetX;
        lastY = e.offsetY;
        web_mouse_move(e.offsetX * dpr(), e.offsetY * dpr());
        canvas.style.cursor = web_cursor_style();
      });
      // On window so drags released outside the canvas still end.
      window.addEventListener("mouseup", (e) => {
        if (e.button !== 0) return;
        const onCanvas = e.target === canvas;
        const x = onCanvas ? e.offsetX : lastX;
        const y = onCanvas ? e.offsetY : lastY;
        web_mouse_up(x * dpr(), y * dpr());
      });
      // Released outside the browser window entirely: end any drag.
      window.addEventListener("blur", () =>
        web_mouse_up(lastX * dpr(), lastY * dpr()),
      );

      canvas.addEventListener(
        "wheel",
        (e) => {
          // deltaMode: 0=pixels, 1=lines, 2=pages → normalize to CSS px.
          const unit =
            e.deltaMode === 1 ? 16 : e.deltaMode === 2 ? canvas.clientHeight : 1;
          web_wheel(e.offsetX * dpr(), e.offsetY * dpr(), e.deltaY * unit * dpr());
          e.preventDefault();
        },
        { passive: false },
      );

      const loop = (t) => {
        web_frame(t);
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
