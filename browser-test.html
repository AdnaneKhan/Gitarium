<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; background: #04070d; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <canvas id="screen"></canvas>
    <script type="module">
      import init, { web_start, web_frame, web_key, web_paste, web_wheel, web_debug_text, web_mouse_down, web_mouse_move, web_mouse_up } from "./pkg/gitarium.js";
      globalThis.host_wake = () => {};
      await init();
      const canvas = document.getElementById("screen");
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(canvas.clientWidth * dpr);
      canvas.height = Math.floor(canvas.clientHeight * dpr);
      // ?gl=1 hides WebGL2 (forces the WebGL1 fallback); ?gl=0 hides every
      // WebGL flavor (forces the Canvas2D software backend).
      const earlyParams = new URLSearchParams(location.search);
      const glParam = earlyParams.get("gl");
      if (glParam === "1" || glParam === "0") {
        const blocked =
          glParam === "0" ? ["webgl2", "webgl", "experimental-webgl"] : ["webgl2"];
        const orig = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function (type, ...rest) {
          return blocked.includes(type) ? null : orig.call(this, type, ...rest);
        };
      }
      // ?token=… authenticates the session (the test runner reads it from
      // .env.test) so suite runs aren't throttled by anonymous rate limits.
      const token = earlyParams.get("token") || undefined;
      // The API-proxy test serves this page with window.__GITARIUM_PROXY__ set;
      // route GitHub calls over a WebSocket to it. Absent → calls go direct.
      const pp = globalThis.__GITARIUM_PROXY__;
      const proxyUrl = pp
        ? (location.protocol === "https:" ? "wss://" : "ws://") + location.host + pp
        : undefined;
      web_start("screen", 15 * dpr, token, proxyUrl);
      let running = true;
      const loop = (t) => { web_frame(t); if (running) requestAnimationFrame(loop); };
      requestAnimationFrame(loop);

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      const enter = () => web_key("Enter", false, false, false);
      const until = async (needle) => {
        for (let i = 0; i < 600; i++) {
          if (web_debug_text().includes(needle)) return true;
          await sleep(100);
        }
        return false;
      };
      const params = new URLSearchParams(location.search);

      // Boot smoke (?mode=boot): renderer construction + first frames only,
      // no GitHub API traffic. Paired with ?gl=1 it proves the WebGL1
      // fallback acquires a context, compiles the shaders, and renders.
      if (params.get("mode") === "boot") {
        const ok = await until("ACCESS TOKEN");
        const glOk =
          glParam == null ||
          document.getElementById("screen").getContext("webgl2") === null;
        console.log(`${ok ? "PASS" : "FAIL"}: boot renders auth screen`);
        console.log(`${glOk ? "PASS" : "FAIL"}: webgl hidden under gl=${glParam}`);
        console.log(`SUITE: ${(ok ? 1 : 0) + (glOk ? 1 : 0)}/2 passed`);
        running = false;
        document.title = ok && glOk ? "SELFTEST-OK" : "SELFTEST-FAIL";
      }

      // Frozen capture (?mode=freeze): drive to the opened-README state,
      // let animations settle, then stop the loop so the screenshot grabs
      // a static frame — used to pixel-compare rendering backends.
      if (params.get("mode") === "freeze") {
        await sleep(100);
        enter();
        await until("owner/repo or organization:");
        web_paste("octocat/Hello-World");
        enter();
        await until("README");
        enter();
        await until("Hello World!");
        await sleep(1200); // smooth scroll / entrance easing settles
        running = false;
        await sleep(50);
        web_frame(performance.now());
        document.title = "FROZEN";
      }

      // Emoji visual check (?mode=emoji): anonymous → open-repo overlay with
      // emoji pasted in, so a screenshot shows whether they render in color.
      if (params.get("mode") === "emoji") {
        await sleep(100);
        enter(); // empty token → anonymous repos screen
        await until("ANONYMOUS MODE");
        web_key("o", false, false, false); // open-repo overlay (a text field)
        await sleep(150);
        web_paste("🚀 🎉 ✅ ❤ 🔥 👍 🐛 📦 🇺🇸 👍🏽 😀 :rocket:");
        await sleep(400);
        running = false;
        await sleep(50);
        web_frame(performance.now());
        document.title = "EMOJI";
      }

      // Search visual (?mode=search&token=…): open an issue and search, so a
      // screenshot shows the search box + highlighted matches.
      if (params.get("mode") === "search") {
        await until("GITARIUM::GITHUB");
        web_key("o", false, false, false);
        await until("owner/repo or organization:");
        web_paste("sharkdp/fd");
        enter();
        await until("CHANGELOG");
        web_key("t", false, false, false); // issues tab
        await until("ISSUES · RECENTLY UPDATED");
        for (let i = 0; i < 100 && !web_debug_text().includes("#"); i++) await sleep(100);
        enter();
        await until("DESCRIPTION");
        web_key("/", false, false, false);
        await sleep(150);
        for (const ch of "the") web_key(ch, false, false, false);
        await sleep(600);
        running = false;
        await sleep(50);
        web_frame(performance.now());
        document.title = "SEARCH";
      }

      // Full regression suite (?mode=suite): results go to the console,
      // which the test-browser.ts runner captures from Chrome's stderr.
      if (params.get("mode") === "suite") {
        const results = [];
        const check = (name, needle, invert = false) => {
          const ok = web_debug_text().includes(needle) !== invert;
          results.push(ok);
          console.log(`${ok ? "PASS" : "FAIL"}: ${name}`);
        };
        const key = (k) => web_key(k, false, false, false);
        const ctrl = (k) => web_key(k, true, false, false);
        const type = (s) => { for (const ch of s) key(ch); };
        const esc = () => key("Escape");

        // "GITARIUM::GITHUB" is the Repos screen title for the user's own
        // list — present both anonymous and signed in, absent everywhere
        // else — so it works as the "back home" landmark for either mode.
        const home = "GITARIUM::GITHUB";
        if (token) {
          await until(home);
          check("signed in", home);
          key("o");
        } else {
          check("auth screen", "ACCESS TOKEN");
          enter();
        }
        await until("owner/repo or organization:");
        check("open overlay", "owner/repo or organization:");

        // Organization browsing + Esc back.
        web_paste("oven-sh");
        enter();
        await until("oven-sh/bun");
        check("org repos listed", "oven-sh/bun");
        check("org header", "ORG::OVEN-SH");

        // Fork filter + sort.
        check("fork card visible", "oven-sh/WebKit");
        key("f");
        await sleep(200);
        check("forks hidden", "oven-sh/WebKit", true);
        check("non-forks remain", "oven-sh/bun");
        key("f"); // restore
        key("s");
        await sleep(200);
        check("sort cycled to name", "SORT: NAME");
        key("s");
        key("s");
        key("s"); // back to PUSHED
        await sleep(100);

        // Repos filter matches descriptions/language, not just names.
        key("/");
        type("allocator");
        await sleep(200);
        check("desc search match", "oven-sh/mimalloc");
        check("desc search filters", "oven-sh/bun", true);
        esc(); // clear filter
        await sleep(100);

        esc();
        await until(home);
        check("back from org", home);

        // Pagination: rust-lang has well over 100 repos, so the count chip
        // (a standalone "shown/total" text run, with a trailing … while
        // pages stream in) can only exceed 100 when pages past the first
        // were fetched and merged. Pages populate as they land, so poll
        // until the merged total passes the first page's size.
        key("o");
        await until("owner/repo or organization:");
        web_paste("rust-lang");
        enter();
        await until("rust-lang/rust");
        {
          let total = 0;
          for (let i = 0; i < 600 && total <= 100; i++) {
            const count = web_debug_text()
              .split("\n")
              .find((l) => /^\d+\/\d+…?$/.test(l.trim()));
            total = count ? parseInt(count.trim().split("/")[1], 10) : 0;
            if (total <= 100) await sleep(100);
          }
          const ok = total > 100;
          results.push(ok);
          console.log(`${ok ? "PASS" : "FAIL"}: org pagination (${total} repos)`);
        }
        esc();
        await until(home);

        // Global code search from the Repos screen (token-gated like the
        // repo-scoped one). Opening a hit fetches that repo and jumps to the
        // file — the cross-repo navigation path.
        key("g");
        await sleep(200);
        if (token) {
          check("global search opens", "CODE SEARCH · GLOBAL");
          // "unsafe" is pervasive and well-indexed in rust-lang/rust. Wait on
          // the "N RESULTS" count (drawn only once hits render) rather than
          // the repo name — the query text echoes the name in the input field.
          web_paste("unsafe repo:rust-lang/rust");
          enter();
          const hit = await until("RESULTS");
          check("global search results", "RESULTS");
          // Mouse-wheel scrolls the results (far more than the 8 visible
          // rows): the rendered window must change after a downward wheel.
          if (hit) {
            const before = web_debug_text();
            web_wheel(640, 350, 600); // over the results list, scroll down
            let scrolled = false;
            for (let i = 0; i < 40 && !scrolled; i++) {
              await sleep(50);
              scrolled = web_debug_text() !== before;
            }
            results.push(scrolled);
            console.log(`${scrolled ? "PASS" : "FAIL"}: wheel scrolls code search`);
          }
          if (hit) {
            enter(); // open the top hit → fetch its repo, navigate to the file
            await until("ACTIONS"); // CODE/ACTIONS tabs appear only in repo view
            check("cross-repo open", "ACTIONS");
            esc(); // content → tree
            await sleep(100);
            esc(); // leave repo → Repos
          } else {
            esc();
          }
        } else {
          check("global search gated", "code search requires an access token");
        }
        await until(home);

        // Agent window: key prompt → save key → chat surface. No Anthropic
        // call is made; this only exercises the window itself.
        key("i");
        await sleep(300);
        check("agent key prompt", "ANTHROPIC API KEY");
        check("agent endpoint field", "API ENDPOINT");
        web_paste("sk-ant-test");
        key("Tab");
        type("proxy.example.com");
        enter();
        await sleep(300);
        check("agent chat ready", "DESCRIBE A GITHUB TASK");
        check("agent endpoint chip", "proxy.example.com");
        esc();
        await until(home);
        check("back from agent", home);

        // User-account fallback.
        key("o");
        await until("owner/repo or organization:");
        web_paste("octocat");
        enter();
        await until("octocat/Hello-World");
        check("user fallback listed", "octocat/Hello-World");

        // Open a repo, browse, open a file.
        key("o");
        await until("owner/repo or organization:");
        web_paste("octocat/Hello-World");
        enter();
        await until("README");
        check("tree loaded", "README");
        enter();
        await until("Hello World!");
        check("file content", "Hello World!");

        // Edit / commit / undo — only when the token can push. begin_edit
        // shows a "view-only" toast and stays in view mode otherwise, so
        // detect that and skip (don't type into the viewer, where 'i' would
        // open the agent). octocat/Hello-World isn't writable by the test
        // token, so this is skipped there; it runs against a writable repo.
        key("e");
        await sleep(200);
        const writable = !web_debug_text().includes("view-only");
        if (writable) {
          type("hi ");
          await sleep(100);
          check("typed text", "hi Hello World!");
          ctrl("s");
          await sleep(200);
          // Ctrl+S stages the file and opens the multi-change commit form.
          check("commit overlay", "CHANGE(S) → MASTER");
          type("test message");
          await sleep(100);
          check("commit msg typed", "test message");
          esc();
          ctrl("z");
          ctrl("z");
          ctrl("z");
          await sleep(100);
          check("undo restored", "hi Hello World!", true);
          esc(); // exit edit mode → content focus
        }

        // Branch picker (the `b` key works from any focus). Land on tree
        // focus first so the repo-leave below takes a single esc.
        esc(); // content → tree focus
        key("b");
        await sleep(300);
        check("branch picker", "SWITCH BRANCH");
        esc();

        // Actions on a repo with CI.
        esc(); // leave repo → confirm discard (buffer modified)
        await sleep(200);
        if (web_debug_text().includes("CONFIRM")) enter();
        await until(home);
        key("o");
        await until("owner/repo or organization:");
        web_paste("sharkdp/fd");
        enter();
        await until("CHANGELOG");
        check("fd tree loaded", "CHANGELOG");

        // Find-file palette over the fetched tree. ("MATCHES" is the result
        // counter only the palette renders; dir + filename are separate
        // text runs, so assert on the "src/" directory run.)
        key("/");
        await sleep(200);
        check("find file overlay", "MATCHES");
        type("main.rs");
        await sleep(300);
        check("path results", "src/");
        enter();
        await until("src/main.rs"); // path bar renders the full path once loaded
        check("opened via search", "src/main.rs");

        // Code search is token-gated; anonymous gets the explanatory toast.
        key("g");
        await sleep(200);
        if (token) {
          check("code search opens", "CODE SEARCH");
          esc();
          await sleep(150);
        } else {
          check("code search gated", "code search requires an access token");
        }

        key("a");
        await until("WORKFLOW RUNS");
        await until("#");
        check("runs listed", "WORKFLOW RUNS");
        enter();
        await until("Set up job");
        check("jobs/steps visible", "Set up job");

        // Issues tab: lazy-load the 100 most-recently-updated open issues,
        // then open one to see its body + comments. ~10s poll for a row so an
        // empty list skips the detail step instead of hanging the full `until`.
        const quickHas = async (needle) => {
          for (let i = 0; i < 100; i++) {
            if (web_debug_text().includes(needle)) return true;
            await sleep(100);
          }
          return false;
        };
        key("t");
        await until("ISSUES · RECENTLY UPDATED");
        check("issues tab", "ISSUES · RECENTLY UPDATED");
        if (await quickHas("#")) {
          enter();
          await until("DESCRIPTION");
          check("issue detail", "DESCRIPTION");
          // Mouse-select text in the body and copy it. A non-empty selection
          // makes Ctrl+C toast (copied / copy failed); an empty one is silent,
          // so the toast's presence proves selection produced text.
          const D = dpr;
          web_mouse_down(40 * D, 146 * D);
          web_mouse_move(680 * D, 184 * D);
          web_mouse_up(680 * D, 184 * D);
          await sleep(80);
          ctrl("c");
          await sleep(150);
          const dbg = web_debug_text();
          const copied = dbg.includes("copied") || dbg.includes("copy failed");
          results.push(copied);
          console.log(`${copied ? "PASS" : "FAIL"}: select + copy from detail`);
          // In-page search: '/' opens the box (close chip ✕) and accepts the
          // typed query; matching/highlight is covered by the screenshot.
          key("/");
          await sleep(120);
          type("descr");
          await sleep(250);
          const sd = web_debug_text();
          const found = sd.includes("descr") && sd.includes("✕");
          results.push(found);
          console.log(`${found ? "PASS" : "FAIL"}: detail search`);
          esc(); // close search
          await sleep(100);
          esc(); // back to list
          await sleep(150);
        }

        // Pulls tab + a PR's detail with merge requirements (mergeability,
        // checks, reviews) — fetched lazily when the detail opens.
        key("p");
        await until("PULL REQUESTS · RECENTLY UPDATED");
        check("pulls tab", "PULL REQUESTS · RECENTLY UPDATED");
        if (await quickHas("#")) {
          enter();
          await until("DESCRIPTION");
          check("pr detail", "DESCRIPTION");
          await until("MERGEABILITY");
          check("pr merge requirements", "MERGEABILITY");
          esc();
        }

        const pass = results.filter(Boolean).length;
        console.log(`SUITE: ${pass}/${results.length} passed`);
        document.title = pass === results.length ? "SUITE-OK" : "SUITE-FAIL";
        running = false; // stop rAF so virtual time drains and Chrome exits
      } else if (params.get("mode") !== "boot") {
      // Auto-drive: anonymous → open a repo → open the last root file
      // (or the Actions tab with ?mode=actions).
      const target = params.get("repo") || "octocat/Hello-World";
      await sleep(100);
      enter();
      await until("owner/repo or organization:");
      web_paste(target);
      enter();
      if (params.get("mode") === "find") {
        await until("CHANGELOG");
        web_key("/", false, false, false);
        await sleep(200);
        for (const ch of "main") web_key(ch, false, false, false);
        await sleep(500);
        document.title = "driven";
      } else if (params.get("mode") === "org") {
        await until("/"); // any full_name row rendered
        await sleep(500);
        document.title = "driven";
      } else if (params.get("mode") !== "branches") {
        await until(target.split("/")[1] === "fd" ? "CHANGELOG" : "README");
      }
      if (params.get("mode") === "branches") {
        // Open the branch picker as soon as branches load, then wheel-scroll.
        for (let i = 0; i < 200; i++) {
          web_key("b", false, false, false);
          if (web_debug_text().includes("SWITCH BRANCH")) break;
          await sleep(100);
        }
        await sleep(300);
        const ticks = parseInt(params.get("wheel") || "0", 10);
        for (let i = 0; i < ticks; i++) {
          web_wheel(canvas.width / 2, canvas.height / 2, 240);
          await sleep(60);
        }
        await sleep(400);
      } else if (params.get("mode") === "actions") {
        web_key("a", false, false, false);
        await until("#");
        enter(); // load jobs for the selected run
        await until("Set up job");
      } else {
        web_key("End", false, false, false);
        enter(); // open last tree row
        await until("EDIT");
      }
      document.title = "driven";
      }
    </script>
  </body>
</html>
